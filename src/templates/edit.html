<!DOCTYPE html>
<html>
<head>
    <title>Edit Receipt</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">

<h2>Edit Receipt</h2>

<form action="/update/{{ receipt['id'] }}" method="POST" class="mt-3">

    <div class="mb-3">
        <label class="form-label">Vendor</label>
        <input type="text" name="vendor" class="form-control" value="{{ receipt['vendor'] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Amount</label>
        <input type="number" step="0.01" name="amount" class="form-control" value="{{ receipt['amount'] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Date</label>
        <input type="date" name="date" class="form-control" value="{{ receipt['date'] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Category</label>
        <input type="text" name="category" class="form-control" value="{{ receipt['category'] }}" required>
    </div>

    <button class="btn btn-primary">Save Changes</button>
    <a href="/receipts" class="btn btn-secondary">Cancel</a>

</form>

</body>
</html>
